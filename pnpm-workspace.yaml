  vitest: ^4.1.5
  eslint: ^9.39.4
  globals: ^16.5.0
  eslint-plugin-react-hooks: ^7.0.1
  eslint-plugin-react-refresh: ^0.4.24
  typescript-eslint: ^8.48.0
  eslint-import-resolver-typescript: ^4.4.4
  eslint-plugin-import-x: ^4.16.1
  "@vitejs/plugin-react": ^6.0.1
